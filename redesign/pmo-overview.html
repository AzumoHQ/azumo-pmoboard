<!-- ============================================================
     PMO Overview — semantic markup
     Paste this <section> into index.html where the overview/landing
     should render (see INTEGRATION.md). All values are EMPTY and get
     filled by renderPmoOverview() in pmo-overview.js from real data.
     No hardcoded names, metrics, dates or users live here.
     ============================================================ -->
<section id="pmoOverview" class="pmo-ov" data-state="loading" aria-label="PMO overview">

  <!-- HERO ---------------------------------------------------- -->
  <div class="pmo-ov-hero">
    <div class="pmo-ov-hero-copy">
      <div class="pmo-ov-eyebrow">Azumo · Operations Command Center</div>
      <!-- greeting text set from currentUser; never hardcode a name -->
      <h1 id="pmoGreeting">Welcome back</h1>
      <div class="pmo-ov-hero-meta">
        <span>Synced from Jira &amp; Harvest</span>
        <span class="dot"></span>
        <span id="lastRefresh">—</span>
      </div>
    </div>
  </div>

  <!-- KPI GRID ------------------------------------------------ -->
  <!-- Cards are generated by JS into this container (clean, data-driven). -->
  <div class="pmo-ov-kpis" id="pmoOverviewKpis"></div>
  <div class="pmo-ov-details" id="pmoOverviewDetails" aria-live="polite" hidden></div>
  <div class="pmo-ov-charts" id="pmoOverviewCharts" hidden></div>
</section>
